services:
  job_queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_URL: ${JOB_QUEUE_URL}
    volumes:
      - job_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  database:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USERNAME}", "-d", "${DATABASE_NAME}", "-p", "5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/app/storage
    env_file:
      - ./.env
    environment:
      REDIS_URL: ${JOB_QUEUE_URL}
      DATABASE_URL: postgresql+psycopg://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@database:5432/${DATABASE_NAME}
    depends_on:
      job_queue:
        condition: service_healthy
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      target: worker
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/app/storage
    env_file:
      - ./.env
    environment:
      REDIS_URL: ${JOB_QUEUE_URL}
      DATABASE_URL: postgresql+psycopg://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@database:5432/${DATABASE_NAME}
    depends_on:
      job_queue:
        condition: service_healthy
      database:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./.env
    environment:
      VITE_VECTOR_EMBEDDING_DIMENSION: ${VECTOR_EMBEDDING_DIMENSION}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  database_admin:
    image: dpage/pgadmin4
    ports:
      - "80:80"
    volumes:
      - 'pgadmin_data:/var/lib/pgadmin'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DATABASE_ADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  job_queue_data:
    driver: local
  database_data:
    driver: local
  uploads_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  app-network:
    driver: bridge