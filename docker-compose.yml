services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  vectordb:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vectordb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/app/storage
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379
      - VECTORDB_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vectordb:5432/${POSTGRES_DB}
    depends_on:
      redis:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      target: worker
    volumes:
      - ./backend:/app
      - /app/.venv
      - uploads_data:/app/app/storage
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379
      - VECTORDB_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vectordb:5432/${POSTGRES_DB}
    depends_on:
      redis:
        condition: service_healthy
      vectordb:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./.env
    environment:
      - VITE_VECTOR_EMBEDDING_DIMENSION=${VECTOR_EMBEDDING_DIMENSION}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "80:80"
    volumes:
      - 'pgadmin_data:/var/lib/pgadmin'
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      vectordb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local
  vectordb_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  app-network:
    driver: bridge